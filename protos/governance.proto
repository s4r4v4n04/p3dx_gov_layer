// Protocol Buffer version - proto3 is the latest version
syntax = "proto3";

// Package name - creates a namespace for the service
// This prevents naming conflicts when multiple proto files are used
package governance;

// ============================================
// Service Definition
// ============================================
// This defines the RPC (Remote Procedure Call) service
// Each rpc line defines a method that can be called remotely
service GovernanceService {
  // Submit a new form submission
  // Input: FormSubmission message
  // Output: SubmissionResponse message
  rpc SubmitForm(FormSubmission) returns (SubmissionResponse);
  
  // Get a form submission by ID
  // Input: GetFormRequest message (contains the ID)
  // Output: FormSubmission message (the form data)
  rpc GetForm(GetFormRequest) returns (FormSubmission);
  
  // Get all form submissions
  // Input: GetAllFormsRequest message (empty for now, can add pagination later)
  // Output: GetAllFormsResponse message (list of forms)
  rpc GetAllForms(GetAllFormsRequest) returns (GetAllFormsResponse);
  
  // Delete a form submission
  // Input: DeleteFormRequest message (contains the ID)
  // Output: DeleteResponse message (success/failure)
  rpc DeleteForm(DeleteFormRequest) returns (DeleteResponse);
}

// ============================================
// Message Definitions
// ============================================
// Messages define the data structures (like JSON objects)
// Each field has a number (1, 2, 3...) which is used in binary encoding
// These numbers must be unique within each message

// Form submission message - represents the complete form data
message FormSubmission {
  // Unique ID of the submission (generated by database)
  string id = 1;
  
  // Form ID (e.g., 'outputform-001')
  string form_id = 2;
  
  // Username of the person who requested this form
  string requested_by = 3;
  
  // Output owner's username
  string output_owner_id = 4;
  
  // Federated learning parameters
  int32 num_server_rounds = 5;      // Number of training rounds
  double fraction_evaluate = 6;    // Fraction of data for evaluation
  int32 local_epochs = 7;           // Local training epochs
  double learning_rate = 8;         // Learning rate for training
  int32 batch_size = 9;             // Batch size for training
  
  // Optional model and framework information
  string model = 10;                // Model name (e.g., 'AlexNet')
  string framework = 11;            // Framework (e.g., 'flwrlabs')
  
  // Key-value pairs for additional components
  // map is like a dictionary/object in JavaScript
  map<string, string> components = 12;
  
  // Status flags
  bool filled = 13;                  // Whether form is filled
  
  // Timestamps
  string requested_at = 14;          // When form was requested
  string filled_at = 15;             // When form was filled
  string created_at = 16;            // Database creation timestamp
  string updated_at = 17;            // Database update timestamp
}

// Response message for form submission
message SubmissionResponse {
  bool success = 1;                  // Whether submission was successful
  string message = 2;               // Success/error message
  string submission_id = 3;          // ID of the created submission
}

// Request message to get a specific form
message GetFormRequest {
  string id = 1;                     // ID of the form to retrieve
}

// Request message to get all forms
message GetAllFormsRequest {
  // Empty for now - can add pagination parameters later
  // e.g., int32 page = 1;
  // e.g., int32 limit = 2;
}

// Response message for getting all forms
message GetAllFormsResponse {
  repeated FormSubmission forms = 1;  // List of form submissions
  int32 total_count = 2;             // Total number of forms
}

// Request message to delete a form
message DeleteFormRequest {
  string id = 1;                     // ID of the form to delete
}

// Response message for delete operation
message DeleteResponse {
  bool success = 1;                  // Whether deletion was successful
  string message = 2;               // Success/error message
}
