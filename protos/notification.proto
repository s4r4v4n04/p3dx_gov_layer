// Protocol Buffer version - proto3 is the latest version
syntax = "proto3";

// Package name - creates a namespace for the service
package notification;

// ============================================
// Service Definition
// ============================================
// This defines the RPC (Remote Procedure Call) service for notifications
// This service handles sending notifications to data providers
service NotificationService {
  // Send notifications to selected data providers
  // Input: NotifyProvidersRequest (contains list of providers and output owner info)
  // Output: NotifyProvidersResponse (success status and notification IDs)
  rpc NotifyProviders(NotifyProvidersRequest) returns (NotifyProvidersResponse);
  
  // Get notifications for a specific user (data provider)
  // Input: GetNotificationsRequest (contains user identification)
  // Output: GetNotificationsResponse (list of notifications)
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  
  // Mark a notification as read
  // Input: MarkNotificationReadRequest (contains notification ID)
  // Output: MarkNotificationReadResponse (success status)
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
}

// ============================================
// Message Definitions
// ============================================

// Provider information message
message ProviderInfo {
  string id = 1;                       // Provider's unique ID
  string username = 2;                 // Provider's username
  string email = 3;                    // Provider's email
  map<string, string> form_data = 4;   // Provider's form data (key-value pairs)
}

// Request to notify providers
message NotifyProvidersRequest {
  repeated ProviderInfo selected_providers = 1;  // List of selected data providers
  string output_owner_id = 2;                     // Output owner's ID
  string notified_at = 3;                         // Timestamp when notification was sent
}

// Response from notify providers
message NotifyProvidersResponse {
  bool success = 1;                               // Whether notification was successful
  string message = 2;                             // Success/error message
  repeated string notification_ids = 3;            // List of created notification IDs
}

// Request to get notifications for a user
message GetNotificationsRequest {
  string username = 1;                             // User's username
  string email = 2;                                // User's email
  string sub = 3;                                  // User's subject ID (from Keycloak)
}

// Notification message
message Notification {
  string id = 1;                                  // Notification ID
  string message = 2;                             // Notification message
  string output_owner_id = 3;                      // Output owner who sent the notification
  string created_at = 4;                          // Creation timestamp
  bool read = 5;                                  // Read status
}

// Response with list of notifications
message GetNotificationsResponse {
  repeated Notification notifications = 1;         // List of notifications
  int32 total_count = 2;                          // Total number of notifications
}

// Request to mark notification as read
message MarkNotificationReadRequest {
  string notification_id = 1;                      // Notification ID to mark as read
}

// Response from marking as read
message MarkNotificationReadResponse {
  bool success = 1;                               // Whether operation was successful
  string message = 2;                             // Success/error message
}
